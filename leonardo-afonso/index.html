<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leonardo Afonso | Papapá</title>

<style>
body{
    margin:0;
    background:#f5f7fa;
    font-family:Arial,sans-serif;
}

.container{
    max-width:520px;
    margin:20px auto;
    padding:15px;
}

.cartao{
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.cartao img{
    width:100%;
    display:block;
}

.cartao-link{
    display:block;
    text-decoration:none;
}

.botoes{
    margin-top:20px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.botao{
    background:#5d90cf;
    color:#fff;
    text-decoration:none;
    text-align:center;
    padding:16px;
    border-radius:12px;
    font-weight:bold;
}

.botao:hover{
    opacity:.9;
}
</style>
</head>

<body>

<div class="container">

    <a href="contato.vcf" class="cartao-link">
        <div class="cartao">

            <!-- Frente -->
            <img src="cartao-2.png" alt="Frente">

            <!-- Verso -->
            <img src="cartao-1.png" alt="Verso">

        </div>
    </a>

    <div class="botoes">

        <a class="botao"
           href="https://wa.me/554199038157"
           target="_blank">
            WhatsApp
        </a>

        <a class="botao"
           href="mailto:leonardo@papapa.com.br">
            E-mail
        </a>

        <a class="botao"
           href="https://papapa.com.br"
           target="_blank">
            Site
        </a>

        <a class="botao"
           href="https://instagram.com/papapa.com.br"
           target="_blank">
            Instagram
        </a>

        <a class="botao"
           href="contato.vcf">
            Salvar Contato
        </a>

        <a class="botao"
           href="cartao.pdf"
           target="_blank">
            Ver PDF
        </a>

    </div>

</div>

</body>
</html>
